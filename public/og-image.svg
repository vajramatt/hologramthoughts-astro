<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wordmark shimmer — same family as .wordmark: blue → cyan → magenta → cyan → blue -->
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="30%" stop-color="#7dcfff"/>
      <stop offset="55%" stop-color="#bb9af7"/>
      <stop offset="80%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#7aa2f7"/>
    </linearGradient>

    <!-- Soft cyan bloom behind the wordmark -->
    <radialGradient id="bloom" cx="42%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7dcfff" stop-opacity="0"/>
    </radialGradient>

    <!-- CRT scanfield — hairline raster, 3px period -->
    <pattern id="scan" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#c0caf5" fill-opacity="0.045"/>
    </pattern>

    <!-- Neon glow for the caret and data packets -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft grain -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.75  0 0 0 0 0.79  0 0 0 0 0.96  0 0 0 0.03 0"/>
    </filter>
  </defs>

  <!-- TokyoNight base -->
  <rect width="1200" height="630" fill="#1a1b26"/>
  <rect width="1200" height="630" fill="url(#bloom)"/>

  <!-- Circuit traces with data packets (the ambient field) -->
  <g fill="none" stroke-width="1">
    <polyline points="1200,84 1004,84 952,136 952,238" stroke="#7dcfff" opacity="0.30"/>
    <polyline points="1200,170 1096,170 1048,218" stroke="#bb9af7" opacity="0.26"/>
    <polyline points="0,452 128,452 176,500 176,560" stroke="#7aa2f7" opacity="0.24"/>
    <polyline points="1064,630 1064,540 1112,492" stroke="#9ece6a" opacity="0.20"/>
  </g>
  <g filter="url(#glow)">
    <rect x="948" y="234" width="7" height="7" fill="#7dcfff" opacity="0.85"/>
    <rect x="1044" y="214" width="6" height="6" fill="#bb9af7" opacity="0.8"/>
    <rect x="173" y="556" width="6" height="6" fill="#7aa2f7" opacity="0.75"/>
    <rect x="1109" y="488" width="6" height="6" fill="#9ece6a" opacity="0.7"/>
  </g>

  <!-- Muse prompt line -->
  <text x="100" y="148" font-family="JetBrains Mono, Menlo, monospace" font-size="22" letter-spacing="0">
    <tspan fill="#9ece6a">muse@hologram</tspan><tspan fill="#737aa2">:~$</tspan><tspan fill="#a9b1d6"> replay ./archive --era 2006..2026</tspan>
  </text>

  <!-- Wordmark + terminal caret -->
  <text x="100" y="312" font-family="JetBrains Mono, Menlo, monospace" font-size="92" font-weight="500"
        fill="url(#wordmark)" letter-spacing="0">hologram thoughts</text>
  <rect x="1058" y="242" width="34" height="76" fill="#9ece6a" filter="url(#glow)"/>

  <!-- Tagline -->
  <text x="100" y="390" font-family="JetBrains Mono, Menlo, monospace" font-size="30" font-style="italic"
        fill="#a9b1d6">an archive of attention</text>

  <!-- Sub-tagline as a code comment -->
  <text x="100" y="438" font-family="JetBrains Mono, Menlo, monospace" font-size="17"
        fill="#737aa2">// twenty years of writing on consciousness, dharma, code, and the strange edges of culture</text>

  <!-- Author — the frontmatter byline -->
  <text x="100" y="528" font-family="JetBrains Mono, Menlo, monospace" font-size="24">
    <tspan fill="#bb9af7">author</tspan><tspan fill="#737aa2">: "</tspan><tspan fill="#9ece6a" font-weight="500">Matthew Williamson</tspan><tspan fill="#737aa2">"</tspan>
  </text>

  <!-- Bottom status row -->
  <text x="100" y="586" font-family="JetBrains Mono, Menlo, monospace" font-size="16"
        fill="#7dcfff" opacity="0.85">hologramthoughts.com</text>
  <text x="1100" y="586" font-family="JetBrains Mono, Menlo, monospace" font-size="16"
        fill="#737aa2" text-anchor="end">// end of transmission</text>

  <!-- Scanfield + grain overlays -->
  <rect width="1200" height="630" fill="url(#scan)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.5"/>
</svg>
