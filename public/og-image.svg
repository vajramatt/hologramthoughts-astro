<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Amber outer glow on terminal window -->
    <filter id="amber-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1200" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1200" height="1" fill="rgba(0,0,0,0.18)"/>
    </pattern>
    <!-- Amber glow box shadow simulation -->
    <filter id="box-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="630" fill="#06080f"/>

  <!-- Terminal window border glow -->
  <rect x="60" y="40" width="1080" height="550" rx="6" ry="6"
        fill="none" stroke="rgba(251,191,36,0.25)" stroke-width="12" filter="url(#box-glow)"/>

  <!-- Terminal window -->
  <rect x="60" y="40" width="1080" height="550" rx="6" ry="6" fill="#090b12"/>
  <rect x="60" y="40" width="1080" height="550" rx="6" ry="6"
        fill="none" stroke="rgba(251,191,36,0.15)" stroke-width="1"/>

  <!-- Titlebar -->
  <rect x="60" y="40" width="1080" height="44" rx="6" ry="6" fill="#0d1020"/>
  <rect x="60" y="64" width="1080" height="20" fill="#0d1020"/>
  <!-- Titlebar bottom border -->
  <line x1="60" y1="84" x2="1140" y2="84" stroke="#1e2538" stroke-width="1"/>

  <!-- Dharma wheel in titlebar -->
  <text x="96" y="72" font-family="serif" font-size="22" fill="#fbbf24" text-anchor="middle" filter="url(#text-glow)">☸</text>

  <!-- Titlebar URL -->
  <text x="600" y="72" font-family="'Courier New', 'Lucida Console', monospace" font-size="15"
        fill="#8892b0" text-anchor="middle" letter-spacing="1">dharma://hologram.thoughts</text>

  <!-- Nav border -->
  <line x1="60" y1="120" x2="1140" y2="120" stroke="#1e2538" stroke-width="1"/>

  <!-- Nav items -->
  <text x="96" y="110" font-family="'Courier New', 'Lucida Console', monospace" font-size="14"
        fill="#8892b0">→ </text>
  <text x="114" y="110" font-family="'Courier New', 'Lucida Console', monospace" font-size="14"
        fill="#fbbf24">hologram-thoughts</text>

  <text x="304" y="110" font-family="'Courier New', 'Lucida Console', monospace" font-size="14"
        fill="#8892b0">→ </text>
  <text x="322" y="110" font-family="'Courier New', 'Lucida Console', monospace" font-size="14"
        fill="#c8d0e8">archive</text>

  <text x="450" y="110" font-family="'Courier New', 'Lucida Console', monospace" font-size="14"
        fill="#8892b0">→ </text>
  <text x="468" y="110" font-family="'Courier New', 'Lucida Console', monospace" font-size="14"
        fill="#c8d0e8">categories</text>

  <!-- PS1 prompt line -->
  <text x="96" y="158" font-family="'Courier New', 'Lucida Console', monospace" font-size="16"
        fill="#34d399">matt@samsara</text>
  <text x="282" y="158" font-family="'Courier New', 'Lucida Console', monospace" font-size="16"
        fill="#8892b0">:</text>
  <text x="292" y="158" font-family="'Courier New', 'Lucida Console', monospace" font-size="16"
        fill="#818cf8">~/dharma</text>
  <text x="394" y="158" font-family="'Courier New', 'Lucida Console', monospace" font-size="16"
        fill="#4a5568"> → </text>
  <text x="430" y="158" font-family="'Courier New', 'Lucida Console', monospace" font-size="16"
        fill="#c8d0e8">read DHARMA.md</text>

  <!-- Separator line (dashed) -->
  <line x1="96" y1="188" x2="1104" y2="188" stroke="#1e2538" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Large dharma wheel centered -->
  <g transform="translate(600, 330)" opacity="0.9">
    <!-- Glow behind wheel -->
    <circle cx="0" cy="0" r="100" fill="rgba(251,191,36,0.04)"/>
    <circle cx="0" cy="0" r="75" fill="rgba(251,191,36,0.03)"/>

    <!-- Outer rim -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner rim -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#fbbf24" opacity="0.5"/>

    <!-- 8 spokes -->
    <line x1="0" y1="-12" x2="0" y2="-50" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="8.5" y1="-8.5" x2="35.5" y2="-35.5" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="12" y1="0" x2="50" y2="0" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="8.5" y1="8.5" x2="35.5" y2="35.5" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="0" y1="12" x2="0" y2="50" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="-8.5" y1="8.5" x2="-35.5" y2="35.5" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="-12" y1="0" x2="-50" y2="0" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>
    <line x1="-8.5" y1="-8.5" x2="-35.5" y2="-35.5" stroke="#fbbf24" stroke-width="1.2" opacity="0.5"/>

    <!-- Spoke tips -->
    <circle cx="0" cy="-59" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="41.7" cy="-41.7" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="59" cy="0" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="41.7" cy="41.7" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="59" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="-41.7" cy="41.7" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="-59" cy="0" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <circle cx="-41.7" cy="-41.7" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Main heading -->
  <text x="600" y="230" font-family="'Courier New', 'Lucida Console', monospace" font-size="13"
        fill="#4a5568" text-anchor="middle" letter-spacing="1"># </text>
  <text x="600" y="230" font-family="'Courier New', 'Lucida Console', monospace" font-size="42"
        fill="#fbbf24" text-anchor="middle" font-weight="700"
        filter="url(#text-glow)">Hologram Thoughts</text>

  <!-- Tagline below wheel -->
  <text x="600" y="455" font-family="'Courier New', 'Lucida Console', monospace" font-size="16"
        fill="#8892b0" text-anchor="middle" letter-spacing="2">spiritual · philosophical · creative writing</text>

  <!-- Author line -->
  <text x="600" y="500" font-family="'Courier New', 'Lucida Console', monospace" font-size="13"
        fill="#4a5568" text-anchor="middle" letter-spacing="1">matthew williamson · hologramthoughts.com</text>

  <!-- CRT scanline overlay -->
  <rect x="60" y="40" width="1080" height="550" fill="url(#scanlines)" opacity="0.4"/>

  <!-- Bottom footer bar -->
  <rect x="60" y="555" width="1080" height="35" fill="#0d1020"/>
  <line x1="60" y1="555" x2="1140" y2="555" stroke="#1e2538" stroke-width="1"/>
  <text x="96" y="577" font-family="'Courier New', 'Lucida Console', monospace" font-size="12"
        fill="#4a5568">© 2025 matt williamson</text>
  <text x="1104" y="577" font-family="'Courier New', 'Lucida Console', monospace" font-size="12"
        fill="#4a5568" text-anchor="end">dharma://hologram.thoughts</text>
</svg>
