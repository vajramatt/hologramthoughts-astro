<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#b8b0a0" flood-opacity="0.5"/>
    </filter>
    <clipPath id="window-clip">
      <rect x="48" y="40" width="1104" height="550" rx="8"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="630" fill="#ece8e0"/>

  <!-- Terminal window (shadow + frame) -->
  <rect x="48" y="40" width="1104" height="550" rx="8" fill="#faf8f4"
        stroke="#d4cfc4" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- All interior elements clipped to window shape -->
  <g clip-path="url(#window-clip)">

    <!-- Titlebar -->
    <rect x="48" y="40" width="1104" height="52" fill="#edeae2"/>
    <line x1="48" y1="92" x2="1152" y2="92" stroke="#d4cfc4" stroke-width="1"/>

    <!-- Dharma wheel in titlebar -->
    <text x="84" y="74" font-family="serif" font-size="22"
          fill="#4338ca" text-anchor="middle" opacity="0.85">☸</text>

    <!-- Titlebar URL -->
    <text x="600" y="75" font-family="'Courier New', 'Lucida Console', monospace"
          font-size="15" fill="#6b6880" text-anchor="middle" letter-spacing="1.5">dharma://hologram.thoughts</text>

    <!-- Watermark dharma wheel -->
    <g transform="translate(600, 360)" opacity="0.08">
      <circle cx="0" cy="0" r="195" fill="none" stroke="#4338ca" stroke-width="3"/>
      <circle cx="0" cy="0" r="144" fill="none" stroke="#4338ca" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="#4338ca" stroke-width="3"/>
      <circle cx="0" cy="0" r="9"  fill="#4338ca"/>
      <line x1="0"    y1="-30"  x2="0"    y2="-144" stroke="#4338ca" stroke-width="2.5"/>
      <line x1="21.2" y1="-21.2" x2="101.8" y2="-101.8" stroke="#4338ca" stroke-width="2.5"/>
      <line x1="30"   y1="0"    x2="144"  y2="0"    stroke="#4338ca" stroke-width="2.5"/>
      <line x1="21.2" y1="21.2"  x2="101.8" y2="101.8"  stroke="#4338ca" stroke-width="2.5"/>
      <line x1="0"    y1="30"   x2="0"    y2="144"  stroke="#4338ca" stroke-width="2.5"/>
      <line x1="-21.2" y1="21.2" x2="-101.8" y2="101.8"  stroke="#4338ca" stroke-width="2.5"/>
      <line x1="-30"  y1="0"    x2="-144" y2="0"    stroke="#4338ca" stroke-width="2.5"/>
      <line x1="-21.2" y1="-21.2" x2="-101.8" y2="-101.8" stroke="#4338ca" stroke-width="2.5"/>
      <circle cx="0"    cy="-169" r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="119.5" cy="-119.5" r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="169"  cy="0"    r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="119.5" cy="119.5"  r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="0"    cy="169"  r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="-119.5" cy="119.5"  r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="-169" cy="0"    r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
      <circle cx="-119.5" cy="-119.5" r="12" fill="none" stroke="#4338ca" stroke-width="2"/>
    </g>

    <!-- Main title -->
    <text x="600" y="295" font-family="'Courier New', 'Lucida Console', monospace"
          font-size="88" font-weight="700" text-anchor="middle">
      <tspan fill="#c9c4bb"># </tspan><tspan fill="#4338ca">Hologram Thoughts</tspan>
    </text>

    <!-- Tagline -->
    <text x="600" y="372" font-family="'Courier New', 'Lucida Console', monospace"
          font-size="26" fill="#4a4560" text-anchor="middle" letter-spacing="3">spiritual · philosophical · creative writing</text>

    <!-- Divider -->
    <line x1="300" y1="410" x2="900" y2="410" stroke="#d4cfc4" stroke-width="1"/>

    <!-- PS1 prompt -->
    <text x="600" y="456" font-family="'Courier New', 'Lucida Console', monospace"
          font-size="24" text-anchor="middle">
      <tspan fill="#047857">matt@samsara</tspan><tspan fill="#6b6880">:</tspan><tspan fill="#6366f1">~/dharma</tspan><tspan fill="#6b6880" dx="10">→</tspan><tspan fill="#4a4560" dx="10">read DHARMA.md</tspan>
    </text>

    <!-- Footer bar -->
    <rect x="48" y="548" width="1104" height="42" fill="#edeae2"/>
    <line x1="48" y1="548" x2="1152" y2="548" stroke="#d4cfc4" stroke-width="1"/>
    <text x="84" y="573" font-family="'Courier New', 'Lucida Console', monospace"
          font-size="13" fill="#6b6880">hologramthoughts.com</text>
    <text x="1116" y="573" font-family="'Courier New', 'Lucida Console', monospace"
          font-size="13" fill="#6b6880" text-anchor="end">© 2006–2026 matthew williamson</text>

  </g>
</svg>
