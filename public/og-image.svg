<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Subtle paper grain using a feTurbulence filter -->
    <filter id="paper-texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="4"/>
      <feColorMatrix values="0 0 0 0 0.15
                             0 0 0 0 0.10
                             0 0 0 0 0.06
                             0 0 0 0.05 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- ══════ Background: cream paper ══════ -->
  <rect width="1200" height="630" fill="#f5efe2"/>

  <!-- ══════ Dharma wheel watermark — quietly present ══════ -->
  <g transform="translate(920, 315)" opacity="0.09" stroke="#8b3a1a" fill="none" stroke-linecap="round">
    <circle cx="0" cy="0" r="250" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="190" stroke-width="1.25"/>
    <circle cx="0" cy="0" r="40"  stroke-width="2.5"/>
    <circle cx="0" cy="0" r="11"  fill="#8b3a1a" stroke="none"/>
    <!-- 8 spokes -->
    <line x1="0"     y1="-40"   x2="0"     y2="-190" stroke-width="2"/>
    <line x1="28.3"  y1="-28.3" x2="134.4" y2="-134.4" stroke-width="2"/>
    <line x1="40"    y1="0"     x2="190"   y2="0" stroke-width="2"/>
    <line x1="28.3"  y1="28.3"  x2="134.4" y2="134.4" stroke-width="2"/>
    <line x1="0"     y1="40"    x2="0"     y2="190" stroke-width="2"/>
    <line x1="-28.3" y1="28.3"  x2="-134.4" y2="134.4" stroke-width="2"/>
    <line x1="-40"   y1="0"     x2="-190"  y2="0" stroke-width="2"/>
    <line x1="-28.3" y1="-28.3" x2="-134.4" y2="-134.4" stroke-width="2"/>
    <!-- 8 tip medallions -->
    <circle cx="0"     cy="-220" r="14" stroke-width="1.5"/>
    <circle cx="155.6" cy="-155.6" r="14" stroke-width="1.5"/>
    <circle cx="220"   cy="0" r="14" stroke-width="1.5"/>
    <circle cx="155.6" cy="155.6" r="14" stroke-width="1.5"/>
    <circle cx="0"     cy="220" r="14" stroke-width="1.5"/>
    <circle cx="-155.6" cy="155.6" r="14" stroke-width="1.5"/>
    <circle cx="-220"  cy="0" r="14" stroke-width="1.5"/>
    <circle cx="-155.6" cy="-155.6" r="14" stroke-width="1.5"/>
  </g>

  <!-- ══════ Top wordmark ══════ -->
  <g transform="translate(72, 78)">
    <text font-family="Georgia, 'Times New Roman', serif"
          font-size="13"
          fill="#a39373"
          letter-spacing="4"
          font-weight="500">HOLOGRAM THOUGHTS · EST. 2006</text>
  </g>

  <!-- ══════ Thin top rule ══════ -->
  <line x1="72" y1="108" x2="1128" y2="108" stroke="#d4c7ac" stroke-width="1"/>

  <!-- ══════ Main title — the "book cover" ══════ -->
  <g transform="translate(72, 295)">
    <text font-family="Georgia, 'Times New Roman', serif"
          font-size="144"
          font-weight="500"
          fill="#1a130d"
          letter-spacing="-2">Hologram</text>
    <text y="132"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="144"
          font-weight="500"
          font-style="italic"
          fill="#8b3a1a"
          letter-spacing="-2">Thoughts.</text>
  </g>

  <!-- ══════ Dek ══════ -->
  <g transform="translate(72, 500)">
    <text font-family="Georgia, 'Times New Roman', serif"
          font-size="26"
          font-style="italic"
          fill="#6a5b47">Spiritual, philosophical, and creative writing —</text>
    <text y="36"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="26"
          font-style="italic"
          fill="#6a5b47">a long conversation with whoever is reading.</text>
  </g>

  <!-- ══════ Bottom rule + metadata ══════ -->
  <line x1="72" y1="578" x2="1128" y2="578" stroke="#d4c7ac" stroke-width="1"/>

  <text x="72" y="605"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15"
        fill="#a39373"
        letter-spacing="1.5">hologramthoughts.com</text>

  <text x="1128" y="605"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15"
        font-style="italic"
        fill="#a39373"
        text-anchor="end">Matthew Williamson  ·  since MMVI</text>
</svg>
